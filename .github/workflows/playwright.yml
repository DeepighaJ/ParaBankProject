name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    # Step 5 - Inject secrets as environment variables
    - name: Run Playwright Tests
      run: npx playwright test
    
      
    # Step 6 - Upload test report on failure
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v5
      if: failure()
      with:
        name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
        path: playwright-report/
        retention-days: 7

    env:
      PARABANK_URL: ${{ secrets.PARABANK_URL }}
      PARABANK_USERNAME: ${{ secrets.PARABANK_USERNAME }}
      PARABANK_PASSWORD: ${{ secrets.PARABANK_PASSWORD }}
    